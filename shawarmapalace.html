<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shawarma Palace</title>
    <link rel="stylesheet" href="shawarmapalace.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <img src="images/SPlogo.jpg" alt="Shawarma Palace Logo" class="logo">
        </div>
        <h1>Shawarma Palace</h1>
        <p class="discount">20% Discount Today!</p>
    </header>

    <main class="food-section">
        <div class="food-grid">
            <div class="food-item">
                <img src="images/chicken-shawarma-sandwich-1.png" alt="Food 1">
                <div class="food-info">
                    <h3>Chicken Wrap</h3>
                    <p>Original: $10 | Discounted: $8</p>
                </div>
            </div>
            <div class="food-item">
                <img src="images/Falafel-1.png" alt="Food 2">
                <div class="food-info">
                    <h3>Falafel Plate</h3>
                    <p>20% off</p>
                </div>
            </div>
            <div class="food-item">
                <img src="images/beef-shawarmasandwich-1.png" alt="Food 3">
                <div class="food-info">
                    <h3>Beef Shawarma</h3>
                    <p>20% off/p>
                </div>
            </div>
            <div class="food-item">
                <img src="images/mixed-shawarma.png" alt="Food 4">
                <div class="food-info">
                    <h3>Chicken Platter</h3>
                    <p>Original: 20% off/p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <h3>Scan to apply discount</h3>
        <img src="images/ExampleCode.png" alt="QR Code" class="qr-code">
    </footer>
</body>
</html>
