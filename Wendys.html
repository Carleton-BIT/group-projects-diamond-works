<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wendy's</title>
    <link rel="stylesheet" href="resturantpage.css">
</head>
<body>


    <header class="header">
        <img src="images/wendylogo.png" alt="wendy's Logo" class="logo">

        <h1>Wendy's</h1>
        <p class="discount">Up to 20% off and more!</p>
    </header>

    <main class="food-section">
        <div class="food-grid">

            <div class="food-item">
                <img src="images/wendyburger.png" alt="Burger">
                <div class="food-info">
                    <h3>Any Burger + Free Medium Fry</h3>
                    <p>Free fries with purchase</p>
                </div>
            </div>

            <div class="food-item">
                <img src="images/frosty.png" alt="Frosty">
                <div class="food-info">
                    <h3>Small Frosty</h3>
                    <p>Only $1</p>
                </div>
            </div>

            <div class="food-item">
                <img src="images/10 Nuggets -  Classic_0.png" alt="Chicken Nuggets">
                <div class="food-info">
                    <h3>6 Piece Nuggets</h3>
                    <p>20% Off</p>
                </div>
            </div>

            <div class="food-item">
                <img src="images/drink.webp" alt="Fountain Drink">
                <div class="food-info">
                    <h3>Fountain Drink</h3>
                    <p>20% Off</p>
                </div>
            </div>

        </div>
    </main>

    <footer class="footer">
        <h3>Limited Time Offers 🍟</h3>
        <p>Grab your favorites now!</p>
        <img src="images/ExampleCode.png" alt="QR Code" class="qr-code">

    </footer>

</body>
</html>
