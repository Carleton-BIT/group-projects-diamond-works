{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poulet Rouge</title>

    <link rel="stylesheet" href="{% static 'css/header.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/resturantpage.css' %}">
</head>
<body>

{% include 'sidebar.html' %}

<header class="main-header">
    <a href="{% url 'homepage' %}" class="logo">
        <img src="{% static 'img/logo.png' %}" alt="CU Eats Logo" class="logo-img">
        <span>CUEats</span>
    </a>

    <nav class="nav-links">
        <a href="{% url 'homepage' %}">Home</a>

        {% if user.is_authenticated %}
            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'signup' %}">Sign Up</a>
            <a href="{% url 'login' %}">Log In</a>
        {% endif %}
    </nav>
</header>

<header class="header">
    <div class="logo-container">
        <img src="{% static 'img/images/pouletrougelogo.png' %}" alt="Poulet Rouge Logo" class="restaurant-logo">
    </div>
    <h1>Poulet Rouge</h1>
    <p class="discount">Exclusive Deals!</p>
</header>

<main class="food-section">
    <div class="food-grid">

        <div class="food-item">
            <img src="{% static 'img/images/rougemini.webp' %}" alt="Rouge Mini Bowl">
            <div class="food-info">
                <h3>Rouge MINI</h3>
                <p>Buy 1 Get 1 free!</p>
            </div>
        </div>

        <div class="food-item">
            <img src="{% static 'img/images/poutine.webp' %}" alt="Rouge Poutine">
            <div class="food-info">
                <h3>Rouge Poutine</h3>
                <p>20% off</p>
            </div>
        </div>

    </div>
</main>

<footer class="footer">
    <h3>Scan to apply discount</h3>
    <img src="{% static 'img/images/ExampleCode.png' %}" alt="QR Code" class="qr-code">
</footer>

</body>
</html>
