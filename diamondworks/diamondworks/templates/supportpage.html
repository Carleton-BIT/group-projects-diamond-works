<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support Page</title>

<link rel="stylesheet" href= supportpage.css>

</head>

<body>

<header class="support-header">
<h1>Support Center</h1>
<p>We're here to help!</p>
</header>

<section class="faq">
<h2>Frequently Asked Questions</h2>

<button class="FAQ-question">How do I create an account?</button>
<div class="FAQ-answer">
<p>You can sign up by clicking the signup button and filling out the registration form.</p>
</div>

<button class="FAQ-question">How do I reset my password?</button>
<div class="FAQ-answer">
<p>Click the forgot password link on the login page.</p>
</div>

</section>

<section class="contact-support">
<h2>Contact Support</h2>

<form>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea placeholder="Describe your issue"></textarea>
<button type="submit">Send Message</button>
</form>

</section>

<footer>
<p>© DiamondWorks Support</p>
</footer>

</body>
</html>
