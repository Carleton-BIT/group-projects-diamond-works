{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log In</title>

    <!-- Reuse SAME CSS as signup -->
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
<link rel="stylesheet" href="{% static 'css/header.css' %}">
</head>

<body>

<!-- HEADER -->
<header class="main-header">
    <a href="/" class="logo">
        <img src="{% static 'img/logo.png' %}" alt="Logo" class="logo-img">
        <span>CUEats</span>
    </a>

    <nav class="nav-links">
        <a href="/">Home</a>
<a href="{% url 'signup' %}">Sign Up</a>
<a href="{% url 'login' %}">Log In</a>
    </nav>
</header>

<!-- Login Form -->
<div class="signup-container">
  <h2>Log In</h2>

    {% if form.errors %}
    <p style="color:rgb(58, 50, 122); text-align:center;">Only Carleton users are allowed.</p>
  {% endif %}
    
<form method="POST" action="{% url 'login' %}">
  {% csrf_token %}
<div class="input-group">
    <label>Username</label>
   <input type="text" id="id_username" name="username" placeholder="Enter your username" required>   
  </div>
  
  <div class="input-group">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter your password" required>
  </div>
      
<a href="{% url 'forgot_password' %}">Forgot password?</a>
    
  <button type="submit">Log In</button>
  <p class="login-link">
  Don't have an account? <a href="/signup/">Sign Up</a>
</p>
     
</form>
</div>

</body>
</html>
